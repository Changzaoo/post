<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">PostFlow logo mark</title>
  <desc id="desc">Gradient P mark with media cards and play icon.</desc>
  <defs>
    <linearGradient id="pf-main" x1="118" y1="95" x2="392" y2="426" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d35ff"/>
      <stop offset=".34" stop-color="#df55ff"/>
      <stop offset=".68" stop-color="#4f7cff"/>
      <stop offset="1" stop-color="#1fb7ff"/>
    </linearGradient>
    <linearGradient id="pf-shadow" x1="226" y1="161" x2="407" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2710a8"/>
      <stop offset="1" stop-color="#1d55df"/>
    </linearGradient>
    <linearGradient id="pf-play" x1="274" y1="199" x2="329" y2="254" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb957"/>
      <stop offset=".48" stop-color="#ff3f93"/>
      <stop offset="1" stop-color="#6d35ff"/>
    </linearGradient>
    <linearGradient id="pf-blue-card" x1="97" y1="159" x2="200" y2="246" gradientUnits="userSpaceOnUse">
